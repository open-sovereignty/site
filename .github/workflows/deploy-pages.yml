name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Stage site files
        run: |
          mkdir -p _site/assets/logos
          cp index.html landscape.html sovereignty-landscape.html redhat-landscape.html _site/
          cp -r assessment css js data _site/
          cp -r assets/. _site/assets/

      - name: Fetch brand logos from Simple Icons CDN
        run: |
          fetch_logo() { curl -sf --max-time 15 "https://cdn.simpleicons.org/$2" -o "_site/assets/logos/$1" || echo "Skipping $2 (not found)"; }
          fetch_logo "scaleway.svg"    "scaleway"
          fetch_logo "ovhcloud.svg"    "ovh"
          fetch_logo "eclipse.svg"     "eclipseide"
          fetch_logo "nextcloud.svg"   "nextcloud"
          fetch_logo "hashicorp.svg"   "hashicorp"
          fetch_logo "minio.svg"       "minio"
          fetch_logo "kubernetes.svg"  "kubernetes"
          fetch_logo "crossplane.svg"  "crossplane"
          fetch_logo "ansible.svg"     "ansible"
          fetch_logo "suse.svg"        "suse"
          fetch_logo "openshift.svg"   "redhatopenshift"
          fetch_logo "sigstore.svg"    "sigstore"
          fetch_logo "linux.svg"       "linux"
          fetch_logo "openstack.svg"   "openstack"
          fetch_logo "envoy.svg"       "envoyproxy"
          fetch_logo "keycloak.svg"    "keycloak"
          fetch_logo "falco.svg"       "falco"

      - name: Fetch CNCF logos for sovereignty landscape
        run: |
          mkdir -p _site/logos
          python3 -c "
          import json, os
          with open('data/cncf-sovereignty-landscape.json') as f:
              data = json.load(f)
          logos = set()
          for cat in data['categories']:
              for item in cat['items']:
                  if item.get('logo'):
                      logos.add(item['logo'])
          for logo in sorted(logos):
              print(logo.split('/')[-1])
          " | while read -r logo_file; do
            curl -sf --max-time 15 "https://landscape.cncf.io/logos/${logo_file}" \
              -o "_site/logos/${logo_file}" || echo "Skipping ${logo_file}"
          done
          echo "Downloaded $(ls _site/logos/*.svg 2>/dev/null | wc -l) CNCF logos"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
